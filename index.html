<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT Clinical Tool</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --range: #8e44ad; --emergency: #c0392b; --premed: #e67e22; --airway: #16a085; --local: #2980b9; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .patient-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; font-size: 0.8em; color: #666; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1.1em; box-sizing: border-box; }
        .tabs { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 65px; padding: 10px 2px; border: none; background: #e0e0e0; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.65em; text-transform: uppercase; }
        .tab-btn.active { background: var(--accent); color: white; }
        .tab-btn.pre-btn.active { background: var(--premed); }
        .tab-btn.la-btn.active { background: var(--local); }
        .tab-btn.emerg-btn.active { background: var(--emergency); }
        .section { display: none; }
        .section.active { display: block; }
        .calc-card { background: #fff; border-left: 5px solid var(--accent); padding: 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #eee; border-left-width: 5px; }
        .airway-card { border-left-color: var(--airway); background: #f4fbf9; }
        .la-card { border-left-color: var(--local); background: #f1f7fa; }
        .emerg-card { border-left-color: var(--emergency); background: #fff5f5; }
        .drug-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.95em; }
        .dose-val { color: var(--success); font-size: 1.1em; }
        .total-label { font-size: 0.8em; color: #7f8c8d; margin-top: 5px; border-top: 1px dashed #eee; padding-top: 4px; }
        .vert-stack { text-align: right; font-size: 0.95em; color: #333; }
        h3 { font-size: 0.9em; margin: 15px 0 8px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .la-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; font-size: 0.8em; }
        .la-item { background: #fff; padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="patient-info">
        <div><label>Weight (kg)</label><input type="number" id="weight" oninput="calculate()" placeholder="0"></div>
        <div><label>Age (years)</label><input type="number" id="age" oninput="calculate()" placeholder="0"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn pre-btn active" onclick="showTab('premed')">Pre-Med</button>
        <button class="tab-btn" onclick="showTab('anaesthesia')">Anaesthesia</button>
        <button class="tab-btn" onclick="showTab('discharge')">T&A Post-Op</button>
        <button class="tab-btn" onclick="showTab('other')">Grommet/FESS Post-Op</button>
        <button class="tab-btn la-btn" onclick="showTab('local')">Local</button>
        <button class="tab-btn emerg-btn" onclick="showTab('emergency')">EMERG</button>
    </div>

    <div id="premed" class="section active"><div id="res-pre"></div></div>
    <div id="anaesthesia" class="section"><div id="res-an"></div></div>
    <div id="discharge" class="section"><div id="res-ds"></div></div>
    <div id="other" class="section"><div id="res-ot"></div></div>
    <div id="local" class="section"><div id="res-la"></div></div>
    <div id="emergency" class="section"><div id="res-em"></div></div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.section, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function card(title, single, instruction, total = "", type = "std") {
        let typeClass = (type === 'emerg' ? 'emerg-card' : (type === 'airway' ? 'airway-card' : (type === 'la' ? 'la-card' : '')));
        return `<div class="calc-card ${typeClass}">
            <div class="drug-header"><span>${title}</span><span class="dose-val">${single}</span></div>
            <div style="font-size:0.85em; color:#555; margin-top:2px;">${instruction}</div>
            ${total ? `<div class="total-label">${total}</div>` : ''}
        </div>`;
    }

    function calculate() {
        const wt = parseFloat(document.getElementById('weight').value) || 0;
        const age = parseFloat(document.getElementById('age').value) || 0;

        // --- 1. PRE-MED ---
        let pre = "";
        if(wt > 0) {
            pre += card("Midazolam PO (0.2-0.5mg/kg)", (wt*0.2).toFixed(1)+"-"+(wt*0.5).toFixed(1)+" mg", "Oral Premedication");
            pre += card("Ketamine PO (2mg/kg)", (wt*2).toFixed(1)+" mg", "Oral Premedication");
            pre += card("Ketamine IM (5mg/kg)", (wt*5).toFixed(1)+" mg", "Intramuscular Premedication");
            pre += card("IN Dexmedetomidine (3mcg/kg)", (wt*3).toFixed(0)+" mcg", "Intranasal Sedation");
        }
        document.getElementById('res-pre').innerHTML = pre || "Enter weight.";

        // --- 2. ANAESTHESIA ---
        let an = "<h3>Airway</h3>";
        if(age > 0) {
            let exact = (age / 4) + 3.5;
            let low = Math.floor(exact * 2) / 2;
            let high = Math.ceil(exact * 2) / 2;
            let sizeRange = (low === high) ? low.toFixed(1) : `${low.toFixed(1)} to ${high.toFixed(1)}`;
            let depth = (12 + (age / 2)).toFixed(1);
            an += card("Cuffed ETT Size", sizeRange, "Formula: (Age/4)+3.5", `Exact: ${exact.toFixed(2)} | Depth: ${depth}cm`, "airway");
        }
        an += "<h3>Drugs</h3>";
        if(wt > 0) {
            an += card("Fentanyl (1-2mcg/kg total)", (wt*1).toFixed(0)+"-"+(wt*2).toFixed(0)+" mcg", "Standard Range");
            an += card("Oxycodone (0.1-0.2mg/kg)", (wt*0.1).toFixed(1)+"-"+(wt*0.2).toFixed(1)+" mg", "Standard Range");
            an += card("Ondansetron (0.1mg/kg)", (wt*0.1).toFixed(1)+" mg", "Antiemetic");
            an += card("Dexamethasone (0.1-0.2mg/kg)", (wt*0.1).toFixed(1)+"-"+(wt*0.2).toFixed(1)+" mg", "Antiemetic");
an += card("Clonidine (1mcg/kg)", (wt*1).toFixed(0)+" mcg", "IV Dose");
            an += card("Paracetamol (15mg/kg)", (wt*15).toFixed(0)+" mg", "Loading Dose");
            an += card("Cephazolin (15mg/kg)", (wt*15).toFixed(0)+" mg", "Prophylaxis");
        }
        document.getElementById('res-an').innerHTML = an || "Enter info.";

        // --- 3. DISCHARGE (T&A) ---
        let ds = "";
        if(wt > 0) {
            let amTDD = wt < 20 ? (wt * 20) : (wt * 40);
            ds += `<div class="calc-card">
                <div class="drug-header"><span>Amoxicillin (5 Days)</span>
                <div class="vert-stack"><b>BD:</b> ${(amTDD/2).toFixed(0)} mg<br><b>TDS:</b> ${(amTDD/3).toFixed(0)} mg</div></div>
                <div class="total-label">TDD: ${amTDD.toFixed(0)} mg (${wt < 20 ? '20' : '40'}mg/kg/day)</div>
            </div>`;
            
            let augTDD = wt * 20;
            ds += card("Augmentin DF", (augTDD/2).toFixed(0)+" mg BD", "TDD calculated at 20mg/kg/day", "TDD: " + augTDD.toFixed(0) + " mg");
            
            let ibR = `${(wt*5).toFixed(0)}-${(wt*10).toFixed(0)} mg TDS`;
            if (age >= 7 && age < 9 && wt >= 20) ibR = "200 mg TDS";
            else if (age >= 9 && age < 11 && wt >= 28) ibR = "250 mg TDS";
            else if (age >= 11 && age <= 12 && wt >= 36) ibR = "300 mg TDS";
            ds += card("Ibuprofen", ibR, "Tiered or 5-10mg/kg TDS range");

            ds += card("Redipred (1mg/kg)", wt.toFixed(0)+" mg", "AM Days 3, 5, 7");
            
            let txaD = wt < 20 ? "250mg" : (wt < 30 ? "500mg" : (wt < 40 ? "750mg" : "1g"));
            ds += card("TXA (25mg/kg/dose)", txaD + " TDS", "Weight-based tier", `Calc @ 25mg/kg: ${(wt*25).toFixed(0)}mg`);
            ds += card("Paracetamol (15mg/kg)", (wt*15).toFixed(0)+" mg QID", "TDD: " + (wt*15*4).toFixed(0)+" mg");
        }
        document.getElementById('res-ds').innerHTML = ds || "Enter weight.";

        // --- 4. OTHER (FESS/Grommet) ---
        let ot = "<h3>Grommets</h3>" + card("Ciloxan (Cipro)", "3 drops TDS", "5 days");
        ot += "<h3>FESS / Septo</h3>";
        ot += card("Bactroban Nasal", "T TDS", "5 days");
        ot += card("Drixine Nasal", "TTT TDS", "5 days");
ot += card("Florinse Nasal", "T QID", "2 weeks");
ot += card("Normal Saline Nasal", "TT QID", "2 weeks");
        if(wt > 0) {
            let kMin = Math.min(500, (wt * 25 / 4));
            let kMax = Math.min(500, (wt * 50 / 4));
            ot += card("Keflex (25-50mg/kg/d)", kMin.toFixed(0)+"-"+kMax.toFixed(0)+" mg QID", `TDD: ${(wt*25).toFixed(0)}-${(wt*50).toFixed(0)} mg`);
        }
        document.getElementById('res-ot').innerHTML = ot;

        // --- 5. LOCAL ---
        let la = "";
        if(wt > 0) {
            let rMax = wt * 3;
            la += `<div class="calc-card la-card"><div class="drug-header"><span>Ropivacaine (Max 3mg/kg)</span><span class="dose-val">${rMax.toFixed(1)} mg</span></div><div class="la-grid"><div class="la-item">0.2%: <b>${(rMax/2).toFixed(1)}mL</b></div><div class="la-item">0.5%: <b>${(rMax/5).toFixed(1)}mL</b></div><div class="la-item">0.75%: <b>${(rMax/7.5).toFixed(1)}mL</b></div><div class="la-item">1%: <b>${(rMax/10).toFixed(1)}mL</b></div></div></div>`;
            let bMax = wt * 2.5;
            la += `<div class="calc-card la-card"><div class="drug-header"><span>Bupivacaine (Max 2.5mg/kg)</span><span class="dose-val">${bMax.toFixed(1)} mg</span></div><div class="la-grid"><div class="la-item">0.25%: <b>${(bMax/2.5).toFixed(1)}mL</b></div><div class="la-item">0.5%: <b>${(bMax/5).toFixed(1)}mL</b></div></div></div>`;
        }
        document.getElementById('res-la').innerHTML = la || "Enter weight.";

        // --- 6. EMERGENCY ---
        let em = "";
        if(wt > 0) {
            em += card("IV Adrenaline (10mcg/kg)", (wt*10).toFixed(0)+" mcg", "1:10,000 = " + (wt*0.1).toFixed(1) + " mL", "", "emerg");
            em += card("Atropine (10-20mcg/kg)", (wt*10).toFixed(0)+"-"+(wt*20).toFixed(0)+" mcg", "IV Bolus", "", "emerg");
            let sIV = wt * 2;
            let sIM = wt * 4;
            em += card("Sux IV (2mg/kg)", sIV.toFixed(0) + " mg", (sIV/50).toFixed(2) + " mL (100mg/2mL vial)", "", "emerg");
            em += card("Sux IM (4mg/kg)", sIM.toFixed(0) + " mg", "Vol: " + (sIM/50).toFixed(2) + " mL undiluted (50mg/mL)", "", "emerg");
            em += card("Defibrillation (4J/kg)", (wt*4).toFixed(0)+" J", "Initial shock", "", "emerg");
        }
        document.getElementById('res-em').innerHTML = em || "Enter weight.";
    }
    calculate();
</script>
</body>
</html>
